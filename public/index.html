<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>
<link rel="stylesheet" href="style.css">
<title>Earn App</title>
</head>
<body>

<div class="header-bg"></div>

<div class="app">

<!-- PROFILE -->
<div class="profile">
  <div class="profile-circle" id="avatar">R</div>
  <div>
    <h3 id="username">User</h3>
    <p>ID: <span id="userid">000</span></p>
  </div>
</div>

<!-- HOME -->
<div id="home" class="page active">

  <div class="balance-card">
    <h4>TOTAL BALANCE</h4>
    <h1><span id="balance">0</span> টাকা</h1>
    <div class="balance-row">
      <div>
        <strong id="totalEarn">0</strong>
        <p>Earned</p>
      </div>
      <div>
        <strong id="todayAds">0/35</strong>
        <p>Today Ads</p>
      </div>
    </div>
  </div>

  <!-- BIG AD SECTION -->
  <div class="ad-section">
    <h3>বিজ্ঞাপন দেখুন</h3>
    <p>প্রতি বিজ্ঞাপনে ২০ টাকা আয় করুন</p>

    <div class="reward-badge">🎁 রিওয়ার্ড: ২০ টাকা</div>

    <div class="progress-bar">
      <div id="progressFill"></div>
    </div>

    <button id="adBtn" onclick="watchAd()">বিজ্ঞাপন দেখুন</button>
    <div id="countdownText"></div>
  </div>

</div>

<!-- WITHDRAW -->
<div id="wallet" class="page">

  <div class="withdraw-card">
    <h3>Withdraw</h3>

    <select id="method">
      <option>Bkash</option>
      <option>Nagad</option>
    </select>

    <input id="number" placeholder="Account Number">
    <input id="amount" placeholder="Amount">

    <button onclick="withdraw()">Request Withdraw</button>
  </div>

  <div class="history-card">
    <h3>Withdraw History</h3>
    <div id="withdrawHistory"></div>
  </div>

</div>

</div>

<!-- CLEAN NAVBAR -->
<div class="bottom-nav">
  <div class="nav active" onclick="showPage('home',this)">🏠<span>হোম</span></div>
  <div class="nav" onclick="showPage('wallet',this)">💼<span>ওয়ালেট</span></div>
</div>

<script src="script.js"></script>
</body>
      </html>
