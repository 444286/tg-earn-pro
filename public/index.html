<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<!-- AdsGram SDK -->
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>

<link rel="stylesheet" href="style.css">
<title>Earn Pro</title>
</head>
<body>

<div class="app">

<!-- HEADER -->
<div class="header">
  <div class="avatar" id="avatar">U</div>
  <div>
    <h2 id="username">User</h2>
    <div class="balance">৳ <span id="balance">0</span></div>
  </div>
</div>

<!-- HOME -->
<div id="home" class="page active">
  <h3>ড্যাশবোর্ড</h3>
  <div class="card">
    <p>আজকের এড</p>
    <h2 id="todayAds">0 / 35</h2>
  </div>
  <div class="card">
    <p>মোট আয়</p>
    <h2 id="totalEarn">0</h2>
  </div>
</div>

<!-- TASK -->
<div id="tasks" class="page">
  <h3>কাজ</h3>

  <button id="adBtn" onclick="watchAd()" class="ad-btn">
    <span id="adText">🎬 এড দেখুন (+5)</span>
    <div class="progress-bar" id="progressBar"></div>
  </button>

  <button onclick="dailyBonus()">🎁 ডেইলি বোনাস</button>
</div>

<!-- SUPPORT -->
<div id="support" class="page">
  <h3>সাপোর্ট</h3>
  <p>@your_support</p>
</div>

</div>

<!-- NAV -->
<div class="bottom-nav">
  <div class="nav active" onclick="showPage('home', this)">🏠<span>হোম</span></div>
  <div class="nav" onclick="showPage('tasks', this)">📋<span>কাজ</span></div>
  <div class="nav" onclick="showPage('support', this)">🎧<span>সাপোর্ট</span></div>
</div>

<script src="script.js"></script>
</body>
    </html>
