<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="style.css">
<title>Earn Pro</title>
</head>
<body>

<div class="app">

<!-- HEADER -->
<div class="header">
  <div class="avatar" id="avatar">U</div>
  <div>
    <h2 id="username">User</h2>
    <div class="balance">৳ <span id="balance">0</span></div>
  </div>
</div>

<!-- HOME -->
<div id="home" class="page active">
  <h3>ড্যাশবোর্ড</h3>
  <div class="card">
    <p>আজকের এড</p>
    <h2 id="todayAds">0 / 35</h2>
  </div>
  <div class="card">
    <p>মোট আয়</p>
    <h2 id="totalEarn">0</h2>
  </div>
</div>

<!-- TASKS -->
<div id="tasks" class="page">
  <h3>কাজ</h3>
  <button onclick="watchAd()">🎬 এড দেখুন (+5)</button>
  <button onclick="dailyBonus()">🎁 ডেইলি বোনাস</button>
</div>

<!-- WITHDRAW -->
<div id="withdraw" class="page">
  <h3>উত্তলন</h3>

  <input id="amount" placeholder="Amount">
  <input id="method" placeholder="Method (Bkash)">
  <input id="number" placeholder="Number">

  <p style="color:#ffcc00;font-size:13px;">
    Minimum withdraw amount is 50
  </p>

  <p id="withdrawMsg" style="font-size:13px;"></p>

  <button onclick="withdraw()">Withdraw</button>
</div>

<!-- SUPPORT -->
<div id="support" class="page">
  <h3>সাপোর্ট</h3>
  <p>@your_support</p>
</div>

</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <div class="nav active" onclick="showPage('home', this)">🏠<span>হোম</span></div>
  <div class="nav" onclick="showPage('tasks', this)">📋<span>কাজ</span></div>
  <div class="nav" onclick="showPage('withdraw', this)">💸<span>উত্তলন</span></div>
  <div class="nav" onclick="showPage('support', this)">🎧<span>সাপোর্ট</span></div>
</div>

<script src="script.js"></script>
</body>
  </html>
