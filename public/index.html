<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>
<link rel="stylesheet" href="style.css">
<title>Red WaterMelon</title>
</head>
<body>

<div class="header-bg"></div>

<div class="app">

<!-- ================= HOME ================= -->
<div id="home" class="page active">

<div class="profile">
<div class="profile-circle" id="avatar">R</div>
<div>
<h3 id="username">User</h3>
<p>ID: <span id="userid">000</span></p>
</div>
</div>

<div class="balance-card">
<h4>TOTAL BALANCE</h4>
<h1><span id="balance">0</span> টাকা</h1>
</div>

<div class="big-ad-card">
<div class="megaphone">📢</div>
<h2>বিজ্ঞাপন দেখুন</h2>
<button id="adBtn" onclick="watchAd()">বিজ্ঞাপন দেখুন</button>
</div>

<!-- ============= TG TASK LIST ============= -->
<div class="task-list">

<div class="task-card">
<div class="task-left">
<div class="icon telegram">📨</div>
<div>
<div class="task-title">Official Channel</div>
<div class="task-reward">+10 টাকা</div>
</div>
</div>
<button class="task-btn"
onclick="handleTGTask(this,'zomato_app_official_channel',10)">
Join
</button>
</div>

<div class="task-card">
<div class="task-left">
<div class="icon telegram">📨</div>
<div>
<div class="task-title">Payment Proof</div>
<div class="task-reward">+8 টাকা</div>
</div>
</div>
<button class="task-btn"
onclick="handleTGTask(this,'zomato_app_payment_proof',8)">
Join
</button>
</div>

</div>
</div>

<!-- ================= SUPPORT ================= -->
<div id="support" class="page">
<div class="card">
<h3>সাপোর্ট</h3>
<p>Telegram: @rajshahitech</p>
</div>
</div>

<!-- ================= WALLET ================= -->
<div id="wallet" class="page">
<div class="balance-card">
<h4>TOTAL BALANCE</h4>
<h1><span id="balanceWithdraw">0</span> টাকা</h1>
</div>
</div>

</div>

<!-- ================= NAV ================= -->
<div class="bottom-nav">
<div class="nav active" onclick="showPage('home',this)">
<i>🏠</i>
<span>হোম</span>
</div>

<div class="nav" onclick="showPage('support',this)">
<i>🎧</i>
<span>সাপোর্ট</span>
</div>

<div class="nav" onclick="showPage('wallet',this)">
<i>💳</i>
<span>ওয়ালেট</span>
</div>
</div>

<script src="script.js"></script>
</body>
</html>
