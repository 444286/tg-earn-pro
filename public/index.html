<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Redirecting...</title>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hind Siliguri', sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wrap {
      text-align: center;
      animation: fadeIn 0.4s ease both;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Spinning ring */
    .ring {
      width: 80px; height: 80px;
      border-radius: 50%;
      border: 5px solid #1e2a35;
      border-top-color: #229ED9;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 28px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 10px;
      color: #fff;
    }

    p {
      color: #8b949e;
      font-size: 0.95rem;
      margin-bottom: 28px;
    }

    /* Progress bar */
    .bar-track {
      width: 220px;
      height: 4px;
      background: #1e2a35;
      border-radius: 100px;
      overflow: hidden;
      margin: 0 auto;
    }
    .bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #229ED9, #29d9c2);
      border-radius: 100px;
      animation: fill 2s linear forwards;
    }
    @keyframes fill { to { width: 100%; } }
  </style>
</head>
<body>
<div class="wrap">
  <div class="ring"></div>
  <h1>নতুন জায়গায় নিয়ে যাচ্ছি...</h1>
  <p>একটু অপেক্ষা করুন</p>
  <div class="bar-track">
    <div class="bar-fill"></div>
  </div>
</div>

<script>
  // নতুন bot link
  var NEW_BOT = 'https://t.me/zomato_platform_bot';

  // ২ সেকেন্ড পরে নতুন bot খুলবে এবং এই window বন্ধ হবে
  setTimeout(function () {
    // নতুন tab/window তে নতুন bot open করো
    window.open(NEW_BOT, '_blank');

    // এই পুরনো window বন্ধ করো
    window.close();

    // যদি window.close() কাজ না করে (কিছু browser block করে)
    // তাহলে সরাসরি redirect করো
    setTimeout(function () {
      window.location.replace(NEW_BOT);
    }, 300);
  }, 2000);
</script>
</body>
</html>
