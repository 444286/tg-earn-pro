<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="style.css">
<title>Ads Earn Pro</title>
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <div class="profile-card">
    <div class="avatar" id="avatar">U</div>
    <div class="profile-info">
      <h2 id="username">User</h2>
      <div class="balance-pill">
        ব্যালেন্স: ৳ <span id="balance">0</span>
      </div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <h3 class="section-title">ড্যাশবোর্ড</h3>

  <div class="dashboard-grid">
    <div class="stat-card">
      <p>আজকের দেখা এড</p>
      <h2 id="todayAds">0 / 35</h2>
    </div>

    <div class="stat-card">
      <p>সর্বমোট আয়</p>
      <h2 id="totalEarn">0</h2>
    </div>
  </div>

  <!-- REFERRAL -->
  <h3 class="section-title">আমন্ত্রণ এবং আয়</h3>

  <div class="ref-card">
    <p>বন্ধুদের আমন্ত্রণ করুন—প্রতিজনে বোনাস!</p>
    <div class="ref-box" id="refLink">Loading...</div>

    <div class="ref-buttons">
      <button onclick="copyRef()">কপি লিংক</button>
      <button class="outline">শেয়ার</button>
    </div>
  </div>

</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <div class="nav-item active">🏠<span>হোম</span></div>
  <div class="nav-item">🎧<span>সাপোর্ট</span></div>
  <div class="nav-item">📋<span>কাজ</span></div>
  <div class="nav-item">💸<span>উত্তলন</span></div>
</div>

<script src="script.js"></script>
</body>
                    </html>
